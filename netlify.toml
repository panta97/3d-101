# Netlify configuration for 3d-101 (Vite multi-page static site).
# See NETLIFY.md for the full deployment walkthrough.

[build]
  # Runs `tsc --noEmit && vite build`; output lands in ./dist.
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Match the local toolchain (Vite 8 needs a modern Node).
  NODE_VERSION = "22"

# Hashed bundles in /assets are content-addressed — cache them forever.
# (HTML keeps Netlify's default short-lived cache so new deploys show up.)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# NOTE: deliberately NO Content-Security-Policy header.
# The in-browser exercise runner compiles learner code with `new Function`
# and spawns a module Web Worker; a restrictive CSP (script-src without
# 'unsafe-eval', or a worker-src that blocks blob/same-origin) would break it.
# Netlify adds no CSP by default — leave it that way.

# NOTE: deliberately NO catch-all SPA redirect (e.g. /* -> /index.html).
# This is a multi-page app: each module is a real file at
# dist/modules/<slug>/index.html, served directly at /modules/<slug>/.
# A wildcard fallback would shadow those pages with the home page.
